<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sara | Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(135deg, #6366f1, #a855f7);
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      opacity: 0.9;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-top: 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #6366f1;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h1>Hi, I'm Sara</h1>
  <p>Web Designer | Portfolio</p>
</header>

<section class="projects">

  <div class="card">
    <h3>To-Do List</h3>
    <p>A simple task management website</p>
    <a href="/To-Do/" class="btn">View</a>
  </div>

  <div class="card">
    <h3>Project 2</h3>
    <p>UI/UX Design</p>
    <a href="#" class="btn">View</a>
  </div>

  <div class="card">
    <h3>Project 3</h3>
    <p>Landing Page</p>
    <a href="#" class="btn">View</a>
  </div>

</section>

<footer>
  <p>© 2026 Sara</p>
</footer>

</body>
</html>

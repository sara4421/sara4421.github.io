<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sara | Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 50px 20px;
      text-align: center;
      background: linear-gradient(135deg, #6366f1, #a855f7);
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin-top: 10px;
      opacity: 0.9;
      font-size: 16px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
      box-sizing: border-box;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-top: 0;
      font-size: 22px;
    }

    .card p {
      font-size: 15px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #6366f1;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header {
        padding: 40px 15px;
      }

      header h1 {
        font-size: 26px;
      }

      header p {
        font-size: 14px;
      }

      .projects {
        grid-template-columns: 1fr;
        padding: 15px;
      }

      .card {
        padding: 18px;
      }

      .card h3 {
        font-size: 20px;
      }

      .btn {
        display: block;
        width: 100%;
        text-align: center;
        box-sizing: border-box;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Hi, I'm Sara</h1>
    <p>Web Designer | Portfolio</p>
  </header>

  <section class="projects">
    <div class="card">
      <h3>To-Do List</h3>
      <p>A simple task management website and dashboard</p>
      <a href="/To-Do/" class="btn">View</a>
    </div>

    <div class="card">
      <h3>My Business</h3>
      <p>Business website design</p>
      <a href="/my-business.html" class="btn">View</a>
    </div>

    <div class="card">
      <h3>Project 3</h3>
      <p>Landing Page</p>
      <a href="#" class="btn">View</a>
    </div>
  </section>

  <footer>
    <p>© 2026 Sara</p>
  </footer>

</body>
</html>
